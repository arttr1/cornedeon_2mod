name: Build Cornedeon Lite Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout vial-qmk (no submodules)
        uses: actions/checkout@v4
        with:
          repository: vial-kb/vial-qmk
          ref: master
          submodules: false

      - name: Init only required submodules for RP2040
        run: |
          git submodule update --init --depth 1 lib/chibios
          git submodule update --init --depth 1 lib/chibios-contrib
          git submodule update --init --depth 1 lib/pico-sdk
          git submodule update --init --depth 1 lib/printf

      - name: Checkout cornedeon_lite into keyboards/alko/cornedeon_lite
        uses: actions/checkout@v4
        with:
          repository: arttr1/cornedeon_2mod
          path: keyboards/alko/cornedeon_lite

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y gcc-arm-none-eabi python3 python3-pip

      - name: Install QMK CLI
        run: pip3 install qmk

      - name: Set QMK home
        run: qmk config user.qmk_home=$GITHUB_WORKSPACE

      - name: Build firmware
        run: qmk compile -kb alko/cornedeon_lite -km vial

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: cornedeon_lite_vial
          path: '*.uf2'
          if-no-files-found: error
