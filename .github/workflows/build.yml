name: Build Cornedeon Lite Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: ghcr.io/vial-kb/vial-qmk/vial_qmk_base:latest

    steps:
      - name: Checkout cornedeon_lite
        uses: actions/checkout@v4
        with:
          path: keyboards/alko/cornedeon_lite

      - name: Copy keyboard into vial-qmk
        run: |
          mkdir -p /vial-qmk/keyboards/alko
          cp -r keyboards/alko/cornedeon_lite /vial-qmk/keyboards/alko/cornedeon_lite

      - name: Build firmware
        run: |
          cd /vial-qmk
          qmk compile -kb alko/cornedeon_lite -km vial

      - name: Copy firmware artifact
        run: cp /vial-qmk/*.uf2 . 2>/dev/null || cp /vial-qmk/.build/*.uf2 . 2>/dev/null

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: cornedeon_lite_vial
          path: '*.uf2'
          if-no-files-found: error
